name: Cloud Forge Lite
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Lite Core
        run: |
          cargo build --release
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-lite
          path: target/release/backend
