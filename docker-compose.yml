services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: athenadb
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: athena_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_storage:/root/.ollama

  backend:
    build: ./backend
    depends_on:
      - db
      - ollama
    env_file:
      - athena.env
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  ollama_storage:
